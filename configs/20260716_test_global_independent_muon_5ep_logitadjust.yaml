# Test config for dev/032_hierarchical_heads_test.py -- evaluates the 5-epoch one-cycle +
# logit adjustment run (logit_adjust_tau=1.0) against the global test fold. Val species F1
# finished at 0.8925 (a small +0.0045 win over the 5ep baseline's 0.8880, but far behind
# oversampling's 0.9096), while family F1 never recovered from an epoch-0 collapse (final
# 0.7897 vs baseline's 0.9695) -- traced to a uniform tau=1.0 being applied across hierarchy
# levels with very different class-imbalance severity (family's log-prior range is ~2x
# species'). See journal/2026-07-does-longtail-help.md for the full investigation.
version: 1.0

test:
    model_path: data/global/models/20260716-234247-heads-global-independent-muon-5ep-logitadjust-effnetv2s/heads-global-independent-muon-5ep-logitadjust-effnetv2s.pt
    parquet_path: data/global/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
    img_dir: data/global/images
    out_dir: data/global/preds
    test_set: '0'
    eval_name: global-test
    batch_size: 64
    aug_img_size: 460
    img_size: 256
    num_workers: 12
    optimal_threshold: true
