version: 1.0
# One-cycle variant of the warmup run, to beat 0.875 species macro-F1 without touching arch,
# img res, bs or epochs. The flat_cos run under-annealed: train/valid loss HALVED on the
# final (25%-of-budget) cosine anneal, i.e. the model only converged at the very end. Here
# the LR peaks after a 0.5-epoch ramp then cosine-decays to 0 over the remaining ~4.5 epochs,
# so annealing gets ~90% of the budget instead of 25% -> steadier per-epoch climb and a
# deeper final minimum. Routed through fit_warmup_cos (schedule=one_cycle), which schedules
# LR only (no momentum cycling) so it stays safe with MuonAuxAdamW's tuple betas.
desc: heads-global-independent-muon-onecycle-effnetv2s
train:
  parquet_path: data/global/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
  img_dir: data/global/images
  out_dir: data/global/models
  fold: '1'
  min_img_per_spc: 50
  model_name: heads-global-independent-muon-onecycle-effnetv2s
  model_arch_name: efficientnet_v2_s
  head: independent
  nb_epochs: 5
  base_lr: 0.001
  batch_size: 64
  aug_img_size: 460
  img_size: 256
  optimizer: muon
  fp16: true
  schedule: one_cycle
  hierarchy_path: null
  family_filter: []
  decoder_num_layers: 4
  decoder_nhead: 1
  precision: fp16
  grad_clip: 5.0
  warmup_epochs: 0.5
  aug_kwargs:
    max_warp: 0.0
    max_lighting: 0.0
    p_lighting: 0.0
    flip_vert: true
    max_rotate: 15.0
    max_zoom: 1.1
