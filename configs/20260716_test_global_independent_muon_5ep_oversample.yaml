# Test config for dev/032_hierarchical_heads_test.py -- evaluates the 5-epoch one-cycle +
# square-root oversampling run (oversample_power=0.5) against the global test fold. Val species
# F1 finished at 0.9096, beating both the 5ep baseline (0.8880) and the 10ep run (0.8977) --
# this is the arbiter for whether that holds on held-out data, since oversampling is the first
# intervention in this project that deliberately skews the training-time class distribution
# away from the fold's natural one. See journal/2026-07-does-longtail-help.md.
version: 1.0

test:
    model_path: data/global/models/20260716-154156-heads-global-independent-muon-5ep-oversample-effnetv2s/heads-global-independent-muon-5ep-oversample-effnetv2s.pt
    parquet_path: data/global/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
    img_dir: data/global/images
    out_dir: data/global/preds
    test_set: '0'
    eval_name: global-test
    batch_size: 64
    aug_img_size: 460
    img_size: 256
    num_workers: 12
    optimal_threshold: true
