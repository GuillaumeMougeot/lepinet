version: 1.0
# Control for the staging question: identical to 20260716_ucloud_onecycle_1ep.yaml except
# it reads straight from the /work mount and oversubscribes the loader.
#
# The mount is latency-bound (~90 ms/file), not bandwidth-bound: a probe read 173 img/s at
# 16 concurrent readers and 1768 img/s at 512. Loader workers are processes that sit
# blocked on the network ~90 ms per image and decode for ~10, so running 256 of them on 48
# vCPU is not oversubscription in any meaningful sense -- ~5/6 of them are parked on I/O at
# any instant. If this reaches the 5090's 710 img/s, staging 481 GB per job buys nothing.
desc: heads-global-independent-muon-onecycle-effnetv2s-ucloud-nocopy
train:
  parquet_path: /work/global_lepi/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
  # Node-local NVMe, filled by ucloud/stage.py during setup. Reading straight from the
  # /work mount caps at ~170 img/s (fastai's default 16 workers x ~90 ms of network
  # latency per file) and costs ~8.7 h/epoch; from local disk the limit is JPEG decode.
  img_dir: /work/global_lepi/images
  out_dir: /work/lepinet/data/ucloud_models   # stays on the drive so results survive
  fold: '1'
  min_img_per_spc: 50
  # fastai defaults to min(16, cpus) regardless of the box; this product has 48 vCPU and
  # decode is the bottleneck once the data is local, so give it every core.
  num_workers: 256
  model_name: heads-global-independent-muon-onecycle-effnetv2s-ucloud-nocopy
  model_arch_name: efficientnet_v2_s
  head: independent
  nb_epochs: 1
  base_lr: 0.001
  batch_size: 64
  aug_img_size: 460
  img_size: 256
  optimizer: muon
  fp16: true
  schedule: one_cycle
  hierarchy_path: null
  family_filter: []
  decoder_num_layers: 4
  decoder_nhead: 1
  precision: fp16
  grad_clip: 5.0
  warmup_epochs: 0.5
  aug_kwargs:
    max_warp: 0.0
    max_lighting: 0.0
    p_lighting: 0.0
    flip_vert: true
    max_rotate: 15.0
    max_zoom: 1.1
