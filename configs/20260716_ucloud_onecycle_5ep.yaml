version: 1.0
# Reproduction of 20260714_heads_global_independent_muon_onecycle.yaml on UCloud. The
# recipe is byte-for-byte that config; only the /work paths and the desc/model_name
# suffix differ, so the result is directly comparable to the local reference run
# (data/global/models/20260714-072404-...), which reached f1_speciesKey 0.8880 at epoch 4
# in 2:12-2:14 per epoch on the RTX 5090.
#
# Note 0.8880 is the number to expect here, NOT the 0.8977 from the 10-epoch resume run
# (20260716-105029-...): that came from a 10-epoch one_cycle budget, and one_cycle over 5
# epochs is a different LR curve, not a prefix of the 10-epoch one.
desc: heads-global-independent-muon-onecycle-effnetv2s-ucloud
train:
  parquet_path: /work/global_lepi/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
  img_dir: /work/global_lepi/images
  out_dir: /work/lepinet/data/ucloud_models
  fold: '1'
  min_img_per_spc: 50
  # The whole ballgame. fastai defaults to min(16, cpus); at 16 readers the /work mount's
  # ~90 ms/file latency caps the loader at ~170 img/s and an epoch takes 8.7 h. These
  # workers sit blocked on the network ~90 ms per image and decode for ~10, so 256 of them
  # on 48 vCPU is not really oversubscription -- most are parked on I/O at any instant.
  # Measured on gpu-nvidia-b200-1-gpu: 950 img/s, 1:24/epoch (vs 2:13 on the local 5090).
  # Staging the images to node-local NVMe first reaches 1108 img/s / 1:09, but costs a
  # 37 min / 594 GB copy that only pays back after ~2.3 epochs -- see ucloud/README.md.
  num_workers: 256
  model_name: heads-global-independent-muon-onecycle-effnetv2s-ucloud
  model_arch_name: efficientnet_v2_s
  head: independent
  nb_epochs: 5
  base_lr: 0.001
  batch_size: 64
  aug_img_size: 460
  img_size: 256
  optimizer: muon
  fp16: true
  schedule: one_cycle
  hierarchy_path: null
  family_filter: []
  decoder_num_layers: 4
  decoder_nhead: 1
  precision: fp16
  grad_clip: 5.0
  warmup_epochs: 0.5
  aug_kwargs:
    max_warp: 0.0
    max_lighting: 0.0
    p_lighting: 0.0
    flip_vert: true
    max_rotate: 15.0
    max_zoom: 1.1
