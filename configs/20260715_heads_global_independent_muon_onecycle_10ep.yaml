version: 1.0
# 10-epoch rerun of the best schedule so far (one-cycle, no regularizer -- the class-dist
# regularizer test came back a wash, within noise of the no-reg run). Correction: mt-only's
# 0.896 species macro-F1 benchmark was actually run for 10 epochs, not 5 as assumed -- our
# best 5-epoch run (one-cycle) hit 0.889 test macro-F1, so matching the epoch budget is the
# next lever before reaching for anything else. Same warmup_epochs=0.5 (short ramp, not
# scaled to the longer run -- it's meant as brief protection, not a proportional phase); the
# one-cycle cosine anneal now gets ~9.5 epochs of budget instead of ~4.5.
desc: heads-global-independent-muon-onecycle-10ep-effnetv2s
train:
  parquet_path: data/global/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
  img_dir: data/global/images
  out_dir: data/global/models
  fold: '1'
  min_img_per_spc: 50
  model_name: heads-global-independent-muon-onecycle-10ep-effnetv2s
  model_arch_name: efficientnet_v2_s
  head: independent
  nb_epochs: 10
  base_lr: 0.001
  batch_size: 64
  aug_img_size: 460
  img_size: 256
  optimizer: muon
  fp16: true
  schedule: one_cycle
  hierarchy_path: null
  family_filter: []
  decoder_num_layers: 4
  decoder_nhead: 1
  precision: fp16
  grad_clip: 5.0
  warmup_epochs: 0.5
  aug_kwargs:
    max_warp: 0.0
    max_lighting: 0.0
    p_lighting: 0.0
    flip_vert: true
    max_rotate: 15.0
    max_zoom: 1.1
