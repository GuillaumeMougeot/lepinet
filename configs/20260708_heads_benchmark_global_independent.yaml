# Config version
version: 1.0

# Experiment description, used in the output dir name
desc: heads-benchmark-global-independent-effnetv2s

# Training hyperparameters
train:
    parquet_path: data/global/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
    img_dir: data/global/images
    out_dir: data/global/models
    fold: '1'
    min_img_per_spc: 50
    model_name: heads-benchmark-global-independent-effnetv2s
    model_arch_name: efficientnet_v2_s
    # One of: hierarchical, independent, autoregressive
    head: independent
    nb_epochs: 20
    freeze_epochs: 1
    base_lr: 0.001
    batch_size: 64
    aug_img_size: 460
    img_size: 256
    hierarchy_path: null
    family_filter: []
    # Only used when head: autoregressive
    decoder_num_layers: 4
    decoder_nhead: 1
