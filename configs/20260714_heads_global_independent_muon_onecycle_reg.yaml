version: 1.0
# One-cycle + mini_trainer's class-distribution regularizer (the last unported lever from
# dev/031's caveats: "mini_trainer arm ran with its class-distribution regularizer disabled").
# Everything else identical to the one-cycle run that hit species macro-F1 0.888 (val, ep4):
# same arch/img-res/bs/epochs/optimizer/schedule/aug. Isolates the regularizer's effect.
desc: heads-global-independent-muon-onecycle-reg-effnetv2s
train:
  parquet_path: data/global/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
  img_dir: data/global/images
  out_dir: data/global/models
  fold: '1'
  min_img_per_spc: 50
  model_name: heads-global-independent-muon-onecycle-reg-effnetv2s
  model_arch_name: efficientnet_v2_s
  head: independent
  nb_epochs: 5
  base_lr: 0.001
  batch_size: 64
  aug_img_size: 460
  img_size: 256
  optimizer: muon
  fp16: true
  schedule: one_cycle
  hierarchy_path: null
  family_filter: []
  decoder_num_layers: 4
  decoder_nhead: 1
  precision: fp16
  grad_clip: 5.0
  warmup_epochs: 0.5
  class_reg_strength: 0.001
  aug_kwargs:
    max_warp: 0.0
    max_lighting: 0.0
    p_lighting: 0.0
    flip_vert: true
    max_rotate: 15.0
    max_zoom: 1.1
