version: 1.0
# Smoke test for the MT-head benchmark pipeline (2026-07-17). Deliberately NOT a memory test:
# family_filter 9717 (Erebidae) cuts the dataframe from 5.67M rows to ~42k, and the COW leak
# that killed the 512-worker run scales with dataframe size -- so this cannot reproduce it and
# is not trying to. num_workers is low here because the MIG slice has 6 vCPU.
#
# What it DOES validate, none of which has ever executed: the train -> test `&&` chain, the
# glob `model_path` in the test config resolving to a just-written checkpoint, the threshold-0
# metrics path, and oversampling running to completion on UCloud. All three 10-epoch jobs died
# inside epoch 1, so the entire back half of the pipeline is unproven. This costs minutes on
# the cheapest GPU instead of finding out 14h into a full run.
desc: smoke-bench-independent-effnetv2s-ucloud
train:
  parquet_path: /work/global_lepi/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
  img_dir: /work/global_lepi/images
  out_dir: /work/lepinet/data/ucloud_smoke
  fold: '1'
  min_img_per_spc: 50
  num_workers: 12
  model_name: smoke-bench-independent-effnetv2s-ucloud
  model_arch_name: efficientnet_v2_s
  head: independent
  nb_epochs: 2
  base_lr: 0.001
  batch_size: 64
  aug_img_size: 460
  img_size: 256
  optimizer: muon
  fp16: true
  schedule: one_cycle
  hierarchy_path: null
  family_filter: ['9717']
  decoder_num_layers: 4
  decoder_nhead: 1
  precision: fp16
  grad_clip: 5.0
  warmup_epochs: 0.5
  oversample_power: 0.5
  logit_adjust_tau: 0.0
  aug_kwargs:
    max_warp: 0.0
    max_lighting: 0.0
    p_lighting: 0.0
    flip_vert: true
    max_rotate: 15.0
    max_zoom: 1.1
