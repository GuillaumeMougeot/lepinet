version: 1.0
# Improved global independent-head run: closes the gap to mini_trainer's own loop by
# porting three things its native training does that dev/030's flat_cos run did not.
#   1. warmup_epochs: short LR ramp (0.5 ep) instead of hitting the pretrained backbone
#      with full-strength Muon steps at step 0 (Muon-compatible ramp; not a frozen warmup).
#   2. aug_kwargs: lighter augmentation matching mini_trainer's (drop fastai's perspective
#      warp + lighting, add vertical flip, rotate 15). At millions of images x 5 epochs each
#      image is seen only ~5x, so heavy distortion underfits the clean distribution.
#   3. grad_clip 5.0 (mini_trainer's value) instead of 1.0 -- we already run the NaN guard.
desc: heads-global-independent-muon-warmup-effnetv2s
train:
  parquet_path: data/global/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
  img_dir: data/global/images
  out_dir: data/global/models
  fold: '1'
  min_img_per_spc: 50
  model_name: heads-global-independent-muon-warmup-effnetv2s
  model_arch_name: efficientnet_v2_s
  head: independent
  nb_epochs: 5
  base_lr: 0.001
  batch_size: 64
  aug_img_size: 460
  img_size: 256
  optimizer: muon
  fp16: true
  schedule: flat_cos
  hierarchy_path: null
  family_filter: []
  decoder_num_layers: 4
  decoder_nhead: 1
  precision: fp16
  grad_clip: 5.0
  warmup_epochs: 0.5
  aug_kwargs:
    max_warp: 0.0
    max_lighting: 0.0
    p_lighting: 0.0
    flip_vert: true
    max_rotate: 15.0
    max_zoom: 1.1
