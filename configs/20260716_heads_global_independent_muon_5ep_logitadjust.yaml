version: 1.0
# Long-tail intervention #2: logit adjustment (Menon et al. 2021, dev/034), on top of the best
# recipe (one-cycle). tau=1.0 is the Fisher-consistent setting for the balanced (macro)
# error. Adds tau*log(prior) to logits at train time only; inference/metrics use raw logits.
# Everything else identical to the 5-epoch one-cycle run, so this isolates the logit-adjustment
# effect. Set logit_adjust_tau: 0 to disable. (Orthogonal to oversampling -- can enable both.)
desc: heads-global-independent-muon-5ep-logitadjust-effnetv2s
train:
  parquet_path: data/global/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
  img_dir: data/global/images
  out_dir: data/global/models
  fold: '1'
  min_img_per_spc: 50
  model_name: heads-global-independent-muon-5ep-logitadjust-effnetv2s
  model_arch_name: efficientnet_v2_s
  head: independent
  nb_epochs: 5
  base_lr: 0.001
  batch_size: 64
  aug_img_size: 460
  img_size: 256
  optimizer: muon
  fp16: true
  schedule: one_cycle
  hierarchy_path: null
  family_filter: []
  decoder_num_layers: 4
  decoder_nhead: 1
  precision: fp16
  grad_clip: 5.0
  warmup_epochs: 0.5
  oversample_power: 0.0
  logit_adjust_tau: 1.0
  aug_kwargs:
    max_warp: 0.0
    max_lighting: 0.0
    p_lighting: 0.0
    flip_vert: true
    max_rotate: 15.0
    max_zoom: 1.1
