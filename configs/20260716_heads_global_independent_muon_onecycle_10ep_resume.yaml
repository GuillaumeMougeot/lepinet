version: 1.0
# Resumes the 20260715 10-epoch one-cycle run, which was killed mid-epoch-9 by an unplanned
# machine reboot at 2026-07-16 10:19 (not a training crash -- no OOM/NaN; loss and f1_speciesKey
# were still improving every epoch: 0.715 -> ... -> 0.882 through epoch 7). Loads the epoch-7
# checkpoint (8 epochs done) and continues the *same* one-cycle LR curve for the remaining 2
# epochs via dev/030's new resume_checkpoint/resume_epochs_done (see fit_resume), instead of
# restarting the anneal from scratch. Writes to a separate model_name/out_dir so it doesn't
# clobber the original run's checkpoints/CSV; merge the two CSVs afterward (fixing the resumed
# rows' epoch numbers to 8/9) for the final per-epoch table.
desc: heads-global-independent-muon-onecycle-10ep-effnetv2s-resume
train:
  parquet_path: data/global/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
  img_dir: data/global/images
  out_dir: data/global/models
  fold: '1'
  min_img_per_spc: 50
  model_name: heads-global-independent-muon-onecycle-10ep-effnetv2s-resume
  model_arch_name: efficientnet_v2_s
  head: independent
  nb_epochs: 10
  base_lr: 0.001
  batch_size: 64
  aug_img_size: 460
  img_size: 256
  optimizer: muon
  fp16: true
  schedule: one_cycle
  hierarchy_path: null
  family_filter: []
  decoder_num_layers: 4
  decoder_nhead: 1
  precision: fp16
  grad_clip: 5.0
  warmup_epochs: 0.5
  resume_checkpoint: data/global/models/20260715-073321-heads-global-independent-muon-onecycle-10ep-effnetv2s/models/heads-global-independent-muon-onecycle-10ep-effnetv2s_7.pth
  resume_epochs_done: 8
  aug_kwargs:
    max_warp: 0.0
    max_lighting: 0.0
    p_lighting: 0.0
    flip_vert: true
    max_rotate: 15.0
    max_zoom: 1.1
