version: 1.0
# UCloud smoke test. Same recipe as 20260714_heads_global_independent_muon_onecycle.yaml
# (independent heads + Muon + one_cycle), with three deliberate differences so a run
# finishes in minutes instead of ~5h and can be judged for correctness, not accuracy:
#   - paths point at the job's mounts (/work/...) instead of the local data/ tree
#   - family_filter restricts to Erebidae (9717): 41,926 rows / 152 species instead of
#     5.67M rows / 12,041 species, i.e. ~1/135th of an epoch's work
#   - nb_epochs 2 instead of 5, enough to see the one_cycle LR actually anneal
# `hierarchy` is only stored as checkpoint metadata (build_class_spec derives the masks
# from df), so reusing the full dataset's hierarchy.csv with a family filter is safe.
desc: heads-global-independent-muon-onecycle-effnetv2s-ucloud-smoke
train:
  parquet_path: /work/global_lepi/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
  img_dir: /work/global_lepi/images
  out_dir: /work/lepinet/data/ucloud_models
  fold: '1'
  min_img_per_spc: 50
  model_name: heads-global-independent-muon-onecycle-effnetv2s-ucloud-smoke
  model_arch_name: efficientnet_v2_s
  head: independent
  nb_epochs: 2
  base_lr: 0.001
  batch_size: 64
  aug_img_size: 460
  img_size: 256
  optimizer: muon
  fp16: true
  schedule: one_cycle
  hierarchy_path: null
  family_filter: ['9717']
  decoder_num_layers: 4
  decoder_nhead: 1
  precision: fp16
  grad_clip: 5.0
  warmup_epochs: 0.5
  aug_kwargs:
    max_warp: 0.0
    max_lighting: 0.0
    p_lighting: 0.0
    flip_vert: true
    max_rotate: 15.0
    max_zoom: 1.1
