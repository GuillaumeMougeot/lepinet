# Config version
version: 1.0

# Experiment description, used in the output dir name
desc: heads-benchmark-small

# Training hyperparameters
train:
    parquet_path: data/small/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.raw_subset.parquet
    img_dir: data/small/images
    out_dir: data/small/models
    fold: '1'
    min_img_per_spc: 50
    model_name: heads-benchmark-small-independent-resnet18
    model_arch_name: resnet18
    # One of: hierarchical, independent, autoregressive
    head: independent
    nb_epochs: 5
    freeze_epochs: 1
    optimizer: muon      # adam | muon
    fp16: true
    schedule: flat_cos   # fine_tune | flat_cos (flat_cos = unfrozen from step 0, required for muon)
    base_lr: 0.001
    batch_size: 64
    aug_img_size: 300
    img_size: 224
    hierarchy_path: null
    family_filter: []
    # Only used when head: autoregressive
    decoder_num_layers: 4
    decoder_nhead: 1
