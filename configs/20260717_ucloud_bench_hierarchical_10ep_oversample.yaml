version: 1.0
# UCloud MT-head benchmark, hierarchical head. One of three configs run in parallel
# (independent, autoregressive) that differ ONLY in `head:` -- everything else is byte-identical,
# so the comparison isolates the head architecture and nothing else.
#
# Recipe = every trick learned locally, per journal/2026-07-why-was-fastai-behind-mini-trainer.md
# and journal/2026-07-does-longtail-help.md:
#   Muon + one_cycle + warmup 0.5 + grad_clip 5.0 + light aug  -> the optimisation ladder
#   oversample_power 0.5 (sqrt sampling)                       -> +1.7pt, the biggest single lever
#   nb_epochs 10                                               -> the full budget
# The local 5ep independent-head reference with this recipe reached test species macro-F1
# 0.9148; 10 epochs is untested and is part of what this benchmark answers.
#
# num_workers 256, NOT 512. This is a memory ceiling, not a throughput choice.
# The 2026-07-17 run at 512 died: it held the full ~1100 img/s decode ceiling for ~36k batches,
# then collapsed 440x and was SIGKILLed with no traceback -- the kernel OOM killer, i.e. host
# RAM, not GPU (a CUDA OOM raises a loud Python exception). dev/030 forks its workers, and
# CPython refcounting breaks copy-on-write on the 634 MB dataframe, so each worker converges on
# its own private copy: ~1.1 GB steady state per worker, measured by dev/037_dl_memory_probe.py.
#   512 workers -> ~525-575 GB  vs 288 GB node  -> OOM, ~36 min in (once the leak saturates)
#   256 workers -> ~270-295 GB  vs 288 GB node  -> fits, thinly (the 5ep run did 7h at 256)
# 256 also costs almost nothing in speed: the pipeline ceiling is decode/augment (~1100 img/s),
# which 256 already reaches. At fastai's default of 16 the /work mount's ~90ms/file latency
# caps the loader at ~170 img/s (8.7h/epoch) -- see ucloud/README.md.
desc: bench-hierarchical-muon-onecycle-10ep-oversample-effnetv2s-ucloud
train:
  parquet_path: /work/global_lepi/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
  img_dir: /work/global_lepi/images
  out_dir: /work/lepinet/data/ucloud_models
  fold: '1'
  min_img_per_spc: 50
  num_workers: 256
  model_name: bench-hierarchical-muon-onecycle-10ep-oversample-effnetv2s-ucloud
  model_arch_name: efficientnet_v2_s
  head: hierarchical
  nb_epochs: 10
  base_lr: 0.001
  batch_size: 64
  aug_img_size: 460
  img_size: 256
  optimizer: muon
  fp16: true
  schedule: one_cycle
  hierarchy_path: null
  family_filter: []
  decoder_num_layers: 4
  decoder_nhead: 1
  precision: fp16
  grad_clip: 5.0
  warmup_epochs: 0.5
  oversample_power: 0.5
  logit_adjust_tau: 0.0
  aug_kwargs:
    max_warp: 0.0
    max_lighting: 0.0
    p_lighting: 0.0
    flip_vert: true
    max_rotate: 15.0
    max_zoom: 1.1
