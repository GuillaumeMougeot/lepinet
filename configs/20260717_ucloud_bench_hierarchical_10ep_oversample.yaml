version: 1.0
# UCloud MT-head benchmark, hierarchical head. One of three configs run in parallel
# (independent, autoregressive) that differ ONLY in `head:` -- everything else is byte-identical,
# so the comparison isolates the head architecture and nothing else.
#
# Recipe = every trick learned locally, per journal/2026-07-why-was-fastai-behind-mini-trainer.md
# and journal/2026-07-does-longtail-help.md:
#   Muon + one_cycle + warmup 0.5 + grad_clip 5.0 + light aug  -> the optimisation ladder
#   oversample_power 0.5 (sqrt sampling)                       -> +1.7pt, the biggest single lever
#   nb_epochs 10                                               -> the full budget
# The local 5ep independent-head reference with this recipe reached test species macro-F1
# 0.9148; 10 epochs is untested and is part of what this benchmark answers.
#
# num_workers 512 is load-bearing on UCloud: at fastai's default of 16 the /work mount's
# ~90ms/file latency caps the loader at ~170 img/s (8.7h/epoch). The mount is latency-bound,
# not bandwidth-bound, so readers park on I/O and 512 procs on 48 vCPU is not real
# oversubscription -- measured 1768 img/s raw read at 512 vs 1545 at 256 (ucloud/README.md).
# Note the pipeline ceiling is decode/augment (~1100 img/s), so the extra read headroom may
# not translate 1:1 into epoch time.
desc: bench-hierarchical-muon-onecycle-10ep-oversample-effnetv2s-ucloud
train:
  parquet_path: /work/global_lepi/0032836-250426092105405_processing_metadata_postprocessed_quality_filtered.parquet
  img_dir: /work/global_lepi/images
  out_dir: /work/lepinet/data/ucloud_models
  fold: '1'
  min_img_per_spc: 50
  num_workers: 512
  model_name: bench-hierarchical-muon-onecycle-10ep-oversample-effnetv2s-ucloud
  model_arch_name: efficientnet_v2_s
  head: hierarchical
  nb_epochs: 10
  base_lr: 0.001
  batch_size: 64
  aug_img_size: 460
  img_size: 256
  optimizer: muon
  fp16: true
  schedule: one_cycle
  hierarchy_path: null
  family_filter: []
  decoder_num_layers: 4
  decoder_nhead: 1
  precision: fp16
  grad_clip: 5.0
  warmup_epochs: 0.5
  oversample_power: 0.5
  logit_adjust_tau: 0.0
  aug_kwargs:
    max_warp: 0.0
    max_lighting: 0.0
    p_lighting: 0.0
    flip_vert: true
    max_rotate: 15.0
    max_zoom: 1.1
